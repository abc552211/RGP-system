<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptoVision 智慧隱形眼鏡驗配系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --border-color: #334155;
            --neon-blue: #0ea5e9;
            --neon-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --od-color: #f59e0b; /* 右眼橘黃 */
            --os-color: #a855f7; /* 左眼紫 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
        }

        /* 頂部導航與 TAB */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
        }
        .main-tabs {
            display: flex;
            gap: 10px;
        }
        .tab-btn {
            background: #020617;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab-btn.active {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        /* 客戶基本資料列 */
        .customer-bar {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--neon-green);
            padding: 15px;
            border-radius: 4px;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }
        .customer-bar input {
            background: #020617;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
        }

        /* 核心：雙眼並列佈局 */
        .eyes-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .eyes-container { grid-template-columns: 1fr; }
        }

        .eye-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .eye-panel.od { border-top: 4px solid var(--od-color); }
        .eye-panel.os { border-top: 4px solid var(--os-color); }

        .eye-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .eye-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
        }
        .od .eye-title { color: var(--od-color); }
        .os .eye-title { color: var(--os-color); }

        /* 區塊與表單排版 */
        .section-title {
            font-size: 14px;
            color: var(--text-muted);
            margin: 15px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
        }
        .input-group input, .input-group select {
            background: #020617;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
        }
        .input-group input:focus {
            border-color: var(--neon-blue);
            outline: none;
        }

        /* 智慧推薦與輸出面板 */
        .result-box {
            background: rgba(2, 6, 23, 0.6);
            border: 1px dashed var(--border-color);
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
        }
        .result-box h4 {
            font-size: 14px;
            color: var(--neon-green);
            margin-bottom: 10px;
        }
        .prescription-badge {
            display: inline-block;
            background: #020617;
            border: 1px solid var(--neon-green);
            padding: 5px 10px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--neon-green);
        }

        /* 功能按鈕 */
        .action-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            background: var(--neon-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success { background: var(--neon-green); }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-circle-nodes"></i> OPTOVISION v1.0</div>
        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('RGP_Sphere')"><i class="fa-solid fa-eye-dropper"></i> 硬式對稱鏡片</button>
            <button class="tab-btn" onclick="switchTab('RGP_Toric')"><i class="fa-solid fa-circle-dot"></i> 硬式環曲面 (Toric)</button>
            <button class="tab-btn" onclick="switchTab('Soft')"><i class="fa-solid fa-droplet"></i> 軟式隱眼驗配</button>
        </div>
    </header>

    <div class="customer-bar">
        <div class="input-group" style="flex-direction:row; align-items:center;">
            <label><i class="fa-solid fa-user"></i> 客戶姓名：</label>
            <input type="text" id="cust_name" placeholder="請輸入姓名">
        </div>
        <div class="input-group" style="flex-direction:row; align-items:center;">
            <label><i class="fa-solid fa-phone"></i> 手機號碼：</label>
            <input type="tel" id="cust_phone" placeholder="09xxxxxxxx">
        </div>
        <div class="input-group" style="flex-direction:row; align-items:center;">
            <label><i class="fa-solid fa-cake-candles"></i> 生日：</label>
            <input type="date" id="cust_birthday">
        </div>
    </div>

    <div class="eyes-container">
        
        <div class="eye-panel od">
            <div class="eye-header">
                <span class="eye-title"><i class="fa-solid fa-r"></i> RIGHT EYE (OD)</span>
                <i class="fa-solid fa-circle-info text-muted"></i>
            </div>

            <div class="section-title"><i class="fa-solid fa-laptop"></i> AUTO 電腦驗光數據</div>
            <div class="grid-inputs">
                <div class="input-group"><label>SPH (球面)</label><input type="number" step="0.25" placeholder="-0.00"></div>
                <div class="input-group"><label>CYL (散光)</label><input type="number" step="0.25" placeholder="-0.00"></div>
                <div class="input-group"><label>AXIS (軸度)</label><input type="number" placeholder="0"></div>
            </div>
            <div class="grid-inputs" style="margin-top: 10px;">
                <div class="input-group"><label>K1 (平坦)</label><input type="number" step="0.01" placeholder="mm / D"></div>
                <div class="input-group"><label>K2 (陡峭)</label><input type="number" step="0.01" placeholder="mm / D"></div>
                <div class="input-group"><label>眼鏡最終處方 (過渡用)</label><input type="number" step="0.25" placeholder="SPH"></div>
            </div>

            <div class="section-title"><i class="fa-solid fa-box-open"></i> 現場試戴鏡片比對</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>選用試戴片</label>
                    <select>
                        <option>-- 自動匹配最接近試戴片 --</option>
                    </select>
                </div>
                <div class="input-group"><label>調整後基弧 BC</label><input type="number" step="0.05" placeholder="0.00"></div>
                <div class="input-group"><label>調整後直徑 DIA</label><input type="number" step="0.1" placeholder="0.0"></div>
            </div>

            <div class="section-title"><i class="fa-solid fa-calculator"></i> 戴鏡驗光 (OR) 與 軟式刻線</div>
            <div class="grid-inputs">
                <div class="input-group"><label>OR SPH</label><input type="number" step="0.25" placeholder="0.00"></div>
                <div class="input-group"><label>LARS 偏轉角度(軟式)</label><input type="number" placeholder="0°"></div>
                <div class="input-group"><label>備註/評估狀態(JSON)</label><input type="text" placeholder="定位/滑動度"></div>
            </div>

            <div class="result-box">
                <h4><i class="fa-solid fa-wand-magic-sparkles"></i> 系統動態建議處方</h4>
                <div class="prescription-badge">BC: -- / DIA: -- / SPH: --</div>
            </div>
        </div>

        <div class="eye-panel os">
            <div class="eye-header">
                <span class="eye-title"><i class="fa-solid fa-l"></i> LEFT EYE (OS)</span>
                <i class="fa-solid fa-circle-info text-muted"></i>
            </div>

            <div class="section-title"><i class="fa-solid fa-laptop"></i> AUTO 電腦驗光數據</div>
            <div class="grid-inputs">
                <div class="input-group"><label>SPH (球面)</label><input type="number" step="0.25" placeholder="-0.00"></div>
                <div class="input-group"><label>CYL (散光)</label><input type="number" step="0.25" placeholder="-0.00"></div>
                <div class="input-group"><label>AXIS (軸度)</label><input type="number" placeholder="0"></div>
            </div>
            <div class="grid-inputs" style="margin-top: 10px;">
                <div class="input-group"><label>K1 (平坦)</label><input type="number" step="0.01" placeholder="mm / D"></div>
                <div class="input-group"><label>K2 (陡峭)</label><input type="number" step="0.01" placeholder="mm / D"></div>
                <div class="input-group"><label>眼鏡最終處方 (過渡用)</label><input type="number" step="0.25" placeholder="SPH"></div>
            </div>

            <div class="section-title"><i class="fa-solid fa-box-open"></i> 現場試戴鏡片比對</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>選用試戴片</label>
                    <select>
                        <option>-- 自動匹配最接近試戴片 --</option>
                    </select>
                </div>
                <div class="input-group"><label>調整後基弧 BC</label><input type="number" step="0.05" placeholder="0.00"></div>
                <div class="input-group"><label>調整後直徑 DIA</label><input type="number" step="0.1" placeholder="0.0"></div>
            </div>

            <div class="section-title"><i class="fa-solid fa-calculator"></i> 戴鏡驗光 (OR) 與 軟式刻線</div>
            <div class="grid-inputs">
                <div class="input-group"><label>OR SPH</label><input type="number" step="0.25" placeholder="0.00"></div>
                <div class="input-group"><label>LARS 偏轉角度(軟式)</label><input type="number" placeholder="0°"></div>
                <div class="input-group"><label>備註/評估狀態(JSON)</label><input type="text" placeholder="定位/滑動度"></div>
            </div>

            <div class="result-box">
                <h4><i class="fa-solid fa-wand-magic-sparkles"></i> 系統動態建議處方</h4>
                <div class="prescription-badge">BC: -- / DIA: -- / SPH: --</div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn" style="background:#475569;"><i class="fa-solid fa-gear"></i> 管理試戴片庫</button>
            <button class="btn btn-success"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存至 Supabase</button>
            <button class="btn"><i class="fa-solid fa-file-pdf"></i> 輸出驗配 PDF 報告</button>
        </div>
    </div>

    <script>
        // 切換硬式對稱/硬式Toric/軟式頁籤的控制邏輯
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log("目前驗配切換至:", type);
            // 這裡日後可以綁定動態切換表單欄位的顯示與隱藏
        }
    </script>
</body>
</html>

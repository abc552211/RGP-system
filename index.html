<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptoVision 智慧隱形眼鏡驗配系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #f1f5f9; --bg-panel: #ffffff; --border-color: #cbd5e1;
            --primary-blue: #0284c7; --primary-green: #059669; --text-main: #1e293b;
            --text-muted: #64748b; --od-color: #ea580c; --os-color: #7c3aed;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        
        header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary-blue); }
        .tab-btn { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 10px 24px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .tab-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        
        .customer-bar { background: var(--bg-panel); border-left: 5px solid var(--primary-green); padding: 15px; border-radius: 8px; display: flex; gap: 20px; margin-bottom: 20px; }
        .customer-bar input { border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; }
        
        .eyes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .eye-panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .eye-panel.od { border-top: 5px solid var(--od-color); }
        .eye-panel.os { border-top: 5px solid var(--os-color); }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; }
        
        .action-bar { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
        .btn { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-secondary { background: #64748b; }
        .btn-success { background: var(--primary-green); }
        .btn-primary { background: var(--primary-blue); }
        
        #sys-message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; text-align: center; grid-column: 1 / -1; }
        .msg-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-notes-medical"></i> OptoVision System</div>
        <div class="main-tabs">
            <button class="tab-btn active" onclick="alert('已切換至: 硬式對稱')">硬式對稱</button>
            <button class="tab-btn" onclick="alert('已切換至: 硬式環曲')">硬式環曲 (Toric)</button>
            <button class="tab-btn" onclick="alert('已切換至: 軟式驗配')">軟式驗配</button>
        </div>
    </header>

    <div class="customer-bar">
        <div><label>姓名：</label><input type="text" id="cust_name" placeholder="王大明"></div>
        <div><label>手機：</label><input type="tel" id="cust_phone" placeholder="0912345678"></div>
        <div><label>生日：</label><input type="date" id="cust_birthday" value="1990-01-01"></div>
    </div>

    <div class="eyes-container">
        <div class="eye-panel od"><h3 style="color: var(--od-color);">右眼 (OD) 區域</h3><p style="margin-top:10px;">(測試中，請先測試下方儲存按鈕)</p></div>
        <div class="eye-panel os"><h3 style="color: var(--os-color);">左眼 (OS) 區域</h3><p style="margin-top:10px;">(測試中，請先測試下方儲存按鈕)</p></div>

        <div id="sys-message"></div>

        <div class="action-bar">
            <button class="btn btn-success" id="saveBtn" onclick="saveToSupabase()"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存至 Supabase</button>
        </div>
    </div>

    <script>
        // 1. 初始化 Supabase
        const supabaseUrl = 'https://pyyszbkcemqvmrecokwt.supabase.co';
        const supabaseKey = 'sb_publishable_kVgIy7INN2ohTMbsdh7PZg_TWG4LH7p';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            console.log("Supabase SDK 載入成功");
        } catch (e) {
            alert("❌ 嚴重錯誤：Supabase SDK 無法載入！請確認你的網路連線，或不要用 file:/// 開啟，改用 Live Server。");
        }

        // 2. 核心寫入功能
        async function saveToSupabase() {
            // 第一道防線：確認按鈕有被觸發
            console.log("按鈕已被點擊！");
            
            const name = document.getElementById('cust_name').value.trim();
            const phone = document.getElementById('cust_phone').value.trim();
            const birthday = document.getElementById('cust_birthday').value;

            if(!name || !phone || !birthday) {
                alert('⚠️ 請填寫完整姓名、手機與生日！');
                return;
            }

            const msgBox = document.getElementById('sys-message');
            msgBox.style.display = 'block';
            msgBox.className = 'msg-success';
            msgBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在連線到 Supabase...';

            try {
                // 執行寫入
                const { data, error } = await supabase
                    .from('customers')
                    .insert([{ name: name, phone: phone, birthday: birthday }])
                    .select();

                if (error) {
                    throw error; // 丟給 catch 處理
                }
                
                // 成功
                console.log("寫入成功資料：", data);
                msgBox.innerHTML = `✅ 寫入成功！已將 ${name} 的資料存入資料庫。`;
                alert(`恭喜！寫入成功！`);
                
            } catch (err) {
                // 失敗
                console.error("Supabase 寫入錯誤：", err);
                msgBox.className = 'msg-error';
                msgBox.innerHTML = `❌ 寫入失敗：${err.message}`;
                alert(`錯誤：${err.message}\n\n這通常是因為第一步的 SQL 沒執行，或是欄位對不上。`);
            }
        }
    </script>
</body>
</html>
